<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millionaire Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Millionaire Map</h1>
        <p class="subtitle">Enter your savings and discover where you're already a millionaire.</p>
        
        <div class="input-group">
            <input id="amount" type="number" placeholder="Enter amount in ZAR" autofocus>
            <button onclick="check()">Explore</button>
        </div>

        <div id="loader" class="loader"></div>
        <div id="results" class="results-grid"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
