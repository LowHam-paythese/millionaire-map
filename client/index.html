<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Millionaire Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-shell">
        <header class="hero">
            <h1>Millionaire Map</h1>
            <p class="subtitle">Where's your wealth worth a million?</p>
        </header>
        
        <section class="search-container">
            <div class="input-card">
                <div class="input-controls">
                    <select id="baseCurrency" aria-label="Select base currency"></select>
                    <input id="amount" type="number" placeholder="Enter amount" autofocus aria-label="Enter amount">
                    <button class="primary-btn" onclick="check()">Explore</button>
                </div>
            </div>
        </section>

        <section id="loader" class="loader-container">
            <div class="spinner"></div>
        </section>

        <section id="results" class="results-layout"></section>
        <div id="close_results"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
